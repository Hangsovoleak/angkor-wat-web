<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Angkor Wat 3D</title>

    <script type="module"
        src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
    </script>

    <style>
        body {
            margin: 0;
            height: 100vh;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            background: #f5f5f5;
        }
    </style>
</head>
<body>

    <model-viewer
        src="./glb/angkor_wat_temple_cambodia.glb"
        alt="Angkor Wat"
        camera-controls
        auto-rotate
        shadow-intensity="1">
    </model-viewer>

</body>
</html>
