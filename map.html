<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រាសាទអង្គរវត្ត</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;700&family=Moul&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Kantumruy Pro", sans-serif;
        }
        .khmer-heading {
            font-family: "Moul", cursive;
        }
        body {
            margin: 0;
            height: 100vh;
        }

        model-viewer {
            width: 100%;
            height: 600px;
            display: block;
        }
    </style>
    <script type="module"
        src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
    </script>
</head>

<body class="bg-[#18527a] text-white antialiased selection:text-white">
    <header
        class="relative h-[450px] sm:h-[550px] md:h-[650px] bg-cover bg-center flex items-center justify-center"
        style="background-image: linear-gradient(to bottom, rgba(20,79,119,0.3), rgba(20,79,119,0.75)), url('./images/page2.png')"
    >
        <div class="absolute inset-0 bg-black/15"></div>
        <div class="relative max-w-4xl mx-auto px-4 text-center">
            <h1 class="khmer-heading text-white text-2xl sm:text-4xl md:text-5xl lg:text-5xl leading-normal md:leading-snug">
                ការវិវត្តឡើងរបស់ ប្រាសាទ
            </h1>
        </div>
    </header>
    <nav class="fixed top-0 left-0 w-full bg-[#2D2722]/95 border-b border-amber-900/40 shadow-lg transition-all duration-300">
        <div class="max-w-8xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 sm:h-20 items-center">

                <a href="./index.html" class="transition-transform hover:scale-105 duration-200">
                    <img
                        src="./images/logo.png"
                        alt="Logo"
                        class="h-9 sm:h-11 w-auto"
                    >
                </a>

                <button id="menu-btn" class="md:hidden inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-white hover:bg-stone-800 focus:outline-none transition-colors" aria-label="Toggle Menu">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>

                <div class="hidden md:flex items-center gap-8 text-sm font-medium tracking-wide">
                    <a href="./index.html" class="text-gray-300 hover:text-white px-1 py-2 transition-colors duration-200">ទំព័រដើម</a>
                    <a href="./detail.html" class="text-gray-300 hover:text-white px-1 py-2 transition-colors duration-200">ការវិវត្ត</a>
                    <a href="./about.html" class="text-gray-300 hover:text-white px-1 py-2 transition-colors duration-200">បុព្វបុរស</a>
                    <a href="./map.html" class="text-[#B9701D] border-b-2 border-[#B9701D] px-1 py-2">ផែនទី</a>
                </div>
            </div>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-[#2D2722]/95 border-t border-amber-900/20 shadow-xl max-h-[calc(100vh-5rem)] overflow-y-auto">
            <div class="px-4 pt-3 pb-4 space-y-2">
                <a href="./index.html" class="block text-gray-300 hover:text-white hover:bg-stone-800/50 px-4 py-3 rounded-lg text-sm transition-colors">ទំព័រដើម</a>
                <a href="./detail.html" class="block text-gray-300 hover:text-white hover:bg-stone-800/50 px-4 py-3 rounded-lg text-sm transition-colors">ការវិវត្ត</a>
                <a href="./about.html" class="block text-gray-300 hover:text-white hover:bg-stone-800/50 px-4 py-3 rounded-lg text-sm transition-colors">បុព្វបុរស</a>
                <a href="./map.html" class="block bg-amber-950/40 text-[#B9701D] font-medium px-4 py-3 rounded-lg text-sm">ផែនទី</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 md:py-24 space-y-16 md:space-y-32">
        <model-viewer
            src="./glb/angkor_wat_temple_cambodia.glb"
            alt="Angkor Wat"
            camera-controls
            auto-rotate
            shadow-intensity="1">
        </model-viewer>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-8 lg:gap-10">
            <div class="bg-[#1b3d54]/50 border border-white/10 p-5 sm:p-6 rounded-2xl shadow-xl flex flex-col justify-between hover:border-amber-500/30 transition-all duration-300 group">
                <img
                    src="./images/m1.png"
                    alt="Aerial View of Water Moat"
                    class="w-full h-auto rounded-xl object-cover shadow"
                >
            </div>
            <div class="bg-[#1b3d54]/50 border border-white/10 p-5 sm:p-6 rounded-2xl shadow-xl flex flex-col justify-between hover:border-amber-500/30 transition-all duration-300 group">
                <img
                    src="./images/m2.png"
                    alt="Aerial View of Water Moat"
                    class="w-full h-auto rounded-xl object-cover shadow"
                >
            </div>
            <div class="bg-[#1b3d54]/50 border border-white/10 p-5 sm:p-6 rounded-2xl shadow-xl flex flex-col justify-between hover:border-amber-500/30 transition-all duration-300 group">
                <img
                    src="./images/m3.png"
                    alt="Aerial View of Water Moat"
                    class="w-full h-auto rounded-xl object-cover shadow"
                >
            </div>
        </section>
    </main>

    <footer class="relative min-h-[600px] bg-cover bg-bottom flex flex-col justify-between overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-t from-black/95 via-black/60 to-transparent z-0"></div>
        <div class="relative z-10 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-12 grid grid-cols-1 lg:grid-cols-2 gap-12 items-start"></div>

        <div class="relative z-10 w-full bg-black/60 border-t border-white/5 py-6 px-4 sm:px-6 lg:px-8">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 text-xs tracking-wide text-center md:text-left">
                <div class="text-gray-400">
                    រ៉ន ហង្សសុវល័ក្ខ ~ និស្សិតដេប៉ាតឺម៉ង់ វិស្វកម្មបច្ចេកវិទ្យាព័ត៌មាន
                </div>
                <div class="khmer-heading text-[#B9701D] text-xs sm:text-sm tracking-widest drop-shadow-sm">
                    វប្បធម៌ រុងរឿង ជាតិសាសន៍រឹងមាំ
                </div>
            </div>
        </div>
    </footer>

    <script>
        const menuBtn = document.getElementById('menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');

        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });
    </script>
</body>
</html>
